# server_parameters.yaml — ThinkStation P720 Production Configuration
# Hardware: 2x Intel Xeon Gold 6136 (48 cores / 96 threads), 128 GB RAM, NVIDIA RTX A4000 (16 GB)
# Version: 1.0 (Server — Full Production Parameters)
#
# Key differences from laptop_parameters.yaml:
#   L_max:              3  →  8   (full hierarchy depth, OOM-safe on 128 GB)
#   sbd_bundles_per_site: 2 → 6   (retains vibronic spectral structure)
#   n_traj:             4  → 100  (publication-grade ensemble)
#   n_traj_temp_sweep:  2  →  10  (per temperature point)
#   n_disorder_samples: 5  → 100  (static disorder realisations)
#   time_max:         200  → 1000 fs (full dynamics window)
#   time_step:          2  →  1.0 fs (stability with 12-mode bath)
#   dpi:              300  →  600  (publication quality)
#   n_workers:          —  →   40  (leaves 8 cores for OS/IO)
#
# NOTE: K (matsubara_truncation) stays at 2.
#   K=10 would generate ~10^11 hierarchy states (77 modes × K=10) → OOM even on 128 GB.
#   K=2 is converged at T=295 K because ν₁ ≈ 1300 cm⁻¹ >> γ_D = 50 cm⁻¹.

metadata:
  project: "Quantum_Agrivoltaic_PT-HOPS"
  version: "1.0.0"
  description: "FMO Light-Harvesting Simulation with PT-HOPS/SBD and Multi-mode Realistic Bath"
  target_hardware: "ThinkStation P720 — 48 cores / 128 GB RAM / RTX A4000"

hamiltonian:
  sites: 7
  coupling_type: "FMO_Realistic"
  source: "Adolphs_Renger_2006"

bath:
  spectral_density: "Kleinekathoefer_Coker_Multi-Mode"
  temperature: 295.0          # Kelvin (Room Temperature)
  reorganization_energy: 35.0 # cm^-1 (Drude-Lorentz)
  drude_cutoff: 50.0          # cm^-1

  # Realistic Vibronic Modes — 12 Dominant Peaks (Coker 2013)
  vibronic_frequencies: [180.0, 220.0, 280.0, 350.0, 520.0, 575.0, 720.0, 1050.0, 1185.0, 1220.0, 1350.0, 1500.0]
  huang_rhys_factors:   [0.05, 0.045, 0.03, 0.025, 0.02, 0.015, 0.01, 0.008, 0.005, 0.005, 0.004, 0.003]
  vibronic_damping:     [10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0] # cm^-1

dynamics:
  L_max: 8                    # Full hierarchy depth — OOM-safe on 128 GB with SBD
  matsubara_truncation: 2     # K=2: converged at T=295 K; K>2 causes OOM (see note above)
  time_max: 1000.0            # fs — full dynamics window
  time_step: 1.0              # fs — optimised for 12-mode bath stability (1500 cm^-1 modes)
  convergence_threshold: 1.0e-6  # Frobenius norm (publication standard)
  sbd_bundles_per_site: 6     # 6 bundles retain key vibronic resonance features (2 compressed 93%)

simulation:
  n_traj: 100                 # Publication-grade ensemble
  n_traj_temp_sweep: 10       # Trajectories per temperature point (Fig 2a sweep)
  n_disorder_samples: 100     # Static disorder realisations (Fig 2b histogram)
  disorder_sigma_cm: 50.0     # cm^-1 — Gaussian diagonal disorder std dev

pulse:
  type: "Gaussian"
  fwhm: 50.0                  # fs
  delay: 0.0                  # fs
  center_freq: 12500.0        # cm^-1 (BChl Qy band)
  amplitude: 0.05
  phase: 0.0

spectral_filter:
  type: "dual_band_gaussian"
  band_centers_nm: [750.0, 820.0]   # nm — converted to cm^-1 internally
  bandwidth_cm: 100.0               # cm^-1 FWHM per band
  weights: [1.0, 1.0]

agrivoltaics:
  coupling_strength: 0.03
  opv_bandgap: 1.9            # eV
  n_opv_sites: 4
  regions: ["Germany", "India", "Kenya"]

visualization:
  theme: "JPCL_Standard"
  dpi: 600                    # Publication quality
  font_size_min: 10
  contrast_high: true
  save_format: "pdf"

# ── Server-specific parallel execution ────────────────────────────────────────
parallel:
  n_workers: 40               # 48 cores − 8 reserved for OS/IO
  use_multiprocessing: true
  chunk_size: auto

  use_gpu: true
  gpu_backend: "jax"
  gpu_memory_fraction: 0.9    # 90% of 16 GB RTX A4000

  max_memory_per_worker: 2.5  # GB (40 × 2.5 = 100 GB < 128 GB total)
  use_shared_memory: true

  trajectory_batch_size: 10
  time_chunk_size: 50

  jit_compile: true
  use_64bit: false            # float32 on GPU (2× faster, sufficient precision)
  prefetch_data: true

performance:
  openblas_threads: 2         # 2 BLAS threads per worker (avoids oversubscription)
  mkl_threads: 2
  jax_platform_name: "gpu"
  jax_enable_x64: false
  profile_execution: false
  log_memory_usage: true
