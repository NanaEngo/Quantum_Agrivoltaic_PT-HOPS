[pytest]
# ── Logging ───────────────────────────────────────────────────────────────────
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s — %(message)s
log_cli_date_format = %H:%M:%S

log_file = reproducibility/logs/pytest_live.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(name)s — %(message)s
log_file_date_format = %H:%M:%S

# ── Markers ───────────────────────────────────────────────────────────────────
# Register custom markers to avoid PytestUnknownMarkWarning.
markers =
    server: Tests requiring ThinkStation P720 (48 cores, 128 GB RAM, RTX A4000).
            Run with: pytest -m server
    laptop: Fast smoke tests for local laptop verification (≤30 s total).
            Run with: pytest -m laptop

# ── Parallel execution (pytest-xdist) ────────────────────────────────────────
# Uncomment the line below to run server tests across 40 workers by default.
# For on-demand parallel runs use: pytest -m server -n 40
# addopts = -n 40

# ── Timeouts (pytest-timeout) ─────────────────────────────────────────────────
# Per-test timeout in seconds.  Server tests (1000 fs × 100 traj) can take
# several minutes each; laptop tests should finish in <60 s.
# Requires: pip install pytest-timeout
# timeout = 1800   # 30 min hard cap per test (server suite)
