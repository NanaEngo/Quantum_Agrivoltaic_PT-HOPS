# parameters.yaml - Source of Truth for Quantum Agrivoltaic PT-HOPS/SBD Simulation
# Version: 1.3 (Hardened for JPCL Resubmission)

metadata:
  project: "Quantum_Agrivoltaic_PT-HOPS"
  version: "1.0.0"
  description: "FMO Light-Harvesting Simulation with PT-HOPS/SBD and Multi-mode Realistic Bath"

hamiltonian:
  sites: 7
  coupling_type: "FMO_Realistic"
  source: "Adolphs_Renger_2006"
  
bath:
  spectral_density: "Kleinekathöfer_Coker_Multi-Mode"
  temperature: 295.0  # Kelvin (Room Temperature)
  reorganization_energy: 35.0 # Drude-Lorentz (cm^-1)
  drude_cutoff: 50.0 # cm^-1
  
  # Realistic Vibronic Modes (12 Dominant Peaks per Coker 2013)
  vibronic_frequencies: [180.0, 220.0, 280.0, 350.0, 520.0, 575.0, 720.0, 1050.0, 1185.0, 1220.0, 1350.0, 1500.0]
  huang_rhys_factors: [0.05, 0.045, 0.03, 0.025, 0.02, 0.015, 0.01, 0.008, 0.005, 0.005, 0.004, 0.003]
  vibronic_damping: [10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0] # cm^-1, one per mode

dynamics:
  hierarchy_depth: 10  # L=10 mandate per Reviewer 1
  matsubara_truncation: 10  # K=10 mandate
  time_max: 1000.0  # fs
  time_step: 2.0  # fs  — step=2 fs → 501 points over 0–1000 fs (matches CSV ground truth)
  convergence_threshold: 1.0e-6  # Frobenius norm
  sbd_bundles_per_site: 2  # Memory optimization: 25 modes -> 2 per site

simulation:
  n_traj: 100  # ensemble trajectories for publication-grade results
  n_traj_temp_sweep: 10   # trajectories per temperature point in Fig 2a sweep
  n_disorder_samples: 100 # static disorder realisations for Fig 2b histogram
  disorder_sigma_cm: 50.0 # cm^-1 — Gaussian diagonal disorder std dev

pulse:
  type: "Gaussian"
  fwhm: 50.0 # fs
  delay: 0.0 # fs (Relative to photoexcitation)
  center_freq: 12500.0 # cm^-1 (BChl Qy band) — used for broadband excitation
  amplitude: 0.05
  phase: 0.0

# Dual-band spectral filter for PT-HOPS filtered excitation (Eq. 3 in manuscript)
# Targets vibronic resonances at 750 nm (13333 cm^-1) and 820 nm (12195 cm^-1)
# Bandwidth Δω = 100 cm^-1 per band (FWHM of each Gaussian peak)
spectral_filter:
  type: "dual_band_gaussian"
  band_centers_nm: [750.0, 820.0]       # nm — converted to cm^-1 internally
  bandwidth_cm: 100.0                    # cm^-1 FWHM per band (Δω in manuscript)
  weights: [1.0, 1.0]                    # relative amplitude of each band

agrivoltaics:
  coupling_strength: 0.03
  opv_bandgap: 1.9 # eV
  n_opv_sites: 4
  regions: ["Germany", "India", "Kenya"]

visualization:
  theme: "JPCL_Standard"
  dpi: 600
  font_size_min: 10  # Legibility compliance
  contrast_high: true
  save_format: "pdf"
