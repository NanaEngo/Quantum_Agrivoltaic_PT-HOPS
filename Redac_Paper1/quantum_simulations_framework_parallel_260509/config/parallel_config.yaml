# Parallel Execution Configuration for Dual Xeon Gold 6136 + RTX A4000
# System: 48 physical cores (96 threads), 128 GB RAM, NVIDIA RTX A4000 (16 GB)

parallel:
  # CPU parallelization
  n_workers: 40  # Leave 8 cores for system/IO
  use_multiprocessing: true
  chunk_size: auto  # Auto-calculate based on workload
  
  # GPU acceleration
  use_gpu: true
  gpu_backend: "jax"  # Options: jax, cupy, torch
  gpu_memory_fraction: 0.9  # Use 90% of GPU memory
  
  # Memory management
  max_memory_per_worker: 2.5  # GB per worker (40 workers * 2.5 GB = 100 GB)
  use_shared_memory: true  # Share Hamiltonian/bath parameters across workers
  
  # Batch processing
  trajectory_batch_size: 10  # Process 10 trajectories per batch
  time_chunk_size: 50  # Split time evolution into chunks for GPU
  
  # Optimization flags
  jit_compile: true  # JIT compile JAX functions
  use_64bit: false  # Use float32 for GPU (2x faster, sufficient precision)
  prefetch_data: true  # Prefetch next batch while processing current

# Performance tuning
performance:
  # BLAS/LAPACK threading (for NumPy/SciPy operations)
  openblas_threads: 2  # 2 threads per worker
  mkl_threads: 2
  
  # JAX configuration
  jax_platform_name: "gpu"  # Force GPU usage
  jax_enable_x64: false  # Use float32 for speed
  
  # Monitoring
  profile_execution: false  # Enable for performance profiling
  log_memory_usage: true
