# laptop_parameters.yaml - LITE Version for Local Verification
# Version: 1.3 (Laptop Safe Toggle)

metadata:
  project: "Quantum_Agrivoltaic_PT-HOPS"
  version: "1.0.0"
  description: "FMO Light-Harvesting Simulation with PT-HOPS/SBD and Multi-mode Realistic Bath"

hamiltonian:
  sites: 7
  coupling_type: "FMO_Realistic"
  source: "Adolphs_Renger_2006"
  
bath:
  spectral_density: "Kleinekathoefer_Coker_Multi-Mode"
  temperature: 295.0  # Kelvin (Room Temperature)
  reorganization_energy: 35.0 # Drude-Lorentz (cm^-1)
  drude_cutoff: 50.0 # cm^-1
  
  # Realistic Vibronic Modes (12 Dominant Peaks per Coker 2013)
  vibronic_frequencies: [180.0, 220.0, 280.0, 350.0, 520.0, 575.0, 720.0, 1050.0, 1185.0, 1220.0, 1350.0, 1500.0]
  huang_rhys_factors: [0.05, 0.045, 0.03, 0.025, 0.02, 0.015, 0.01, 0.008, 0.005, 0.005, 0.004, 0.003]
  vibronic_damping: [10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0] # cm^-1, one per mode

dynamics:
  L_max: 3  # L=3: Laptop-safe (Production requires L=8)
  matsubara_truncation: 2   # K=2: converged at T=295 K
  time_max: 200.0  # Shortened for rapid laptop verification (Step 1-2 only)
  time_step: 2.0  # Improved stability for 1500 cm^-1 modes (10 points/period)
  convergence_threshold: 1.0e-3  # Loose for laptop
  sbd_bundles_per_site: 2

simulation:
  n_traj: 4  # Small ensemble for laptop speed
  n_traj_temp_sweep: 2   # Minimal sweep for verification
  n_disorder_samples: 5 # Minimal disorder for verification
  disorder_sigma_cm: 50.0 # cm^-1

pulse:
  type: "Gaussian"
  fwhm: 50.0 # fs
  delay: 0.0 # fs
  center_freq: 12500.0 # cm^-1
  amplitude: 0.05
  phase: 0.0

spectral_filter:
  type: "dual_band_gaussian"
  band_centers_nm: [750.0, 820.0]
  bandwidth_cm: 100.0
  weights: [1.0, 1.0]

agrivoltaics:
  coupling_strength: 0.03
  opv_bandgap: 1.9 # eV
  n_opv_sites: 4
  regions: ["Germany", "India", "Kenya"]

visualization:
  theme: "JPCL_Standard"
  dpi: 300  # Lower DPI for laptop
  font_size_min: 10
  contrast_high: true
  save_format: "png"
